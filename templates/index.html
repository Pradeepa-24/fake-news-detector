<!doctype html>

<html>
  <head>
    <title>AI Fake News Detection System</title>

    ```
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 30px;
      }

      .container {
        background: white;
        width: 90%;
        max-width: 900px;
        padding: 35px;
        border-radius: 20px;
        box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
        animation: fadeIn 1s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 10px;
      }

      .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 25px;
      }

      textarea {
        width: 100%;
        height: 250px;
        padding: 15px;
        font-size: 16px;
        border: 2px solid #ddd;
        border-radius: 12px;
        outline: none;
        transition: 0.3s;
      }

      textarea:focus {
        border-color: #667eea;
        box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
      }

      button {
        width: 100%;
        margin-top: 20px;
        padding: 14px;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        font-weight: bold;
        color: white;
        background: linear-gradient(135deg, #667eea, #764ba2);
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.02);
      }

      .result {
        margin-top: 25px;
        text-align: center;
        font-size: 24px;
        font-weight: bold;
        padding: 15px;
        border-radius: 12px;
        background: #f5f5f5;
      }

      .footer {
        text-align: center;
        margin-top: 20px;
        color: #777;
        font-size: 14px;
      }
    </style>
    ```
  </head>

  <body>
    <div class="container">
      ```
      <h1>📰 AI-Powered Fake News Detection</h1>

      <p class="subtitle">
        Detect fake and real news articles using Machine Learning & NLP
      </p>

      <form method="POST">
        <textarea
          name="news"
          placeholder="Paste a complete news article here (minimum 30 words)..."
          required
        >
{{ news }}</textarea
        >

        <button type="submit">🔍 Analyze News</button>
      </form>

      {% if prediction %}
      <div class="result">{{ prediction }}</div>
      {% endif %}

      <div class="footer">
        Built using Python • Flask • NLP • Machine Learning
      </div>
      ```
    </div>
  </body>
</html>
